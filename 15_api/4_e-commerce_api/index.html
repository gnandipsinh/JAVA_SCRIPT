<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>E-commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>


    <header class="sticky-top">

        <nav class="navbar navbar-expand-lg custom-navbar">

            <div class="container">

                <a class="navbar-brand text-white fs-2 fw-bold" href="#">
                    LuxuryShop
                </a>

                <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent">

                    <span class="navbar-toggler-icon"></span>

                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">


                    <ul class="navbar-nav mx-auto">

                        <li class="nav-item">
                            <a class="nav-link active" href="#" onclick="showProducts()">
                                Home
                            </a>
                        </li>



                    </ul>



                    <div class="d-flex align-items-center gap-2">

                        <input id="search" type="text" class="form-control" placeholder="Search Product..."
                            onclick="searchProduct()">

                        <button class="btn btn-light" onclick="searchProduct()">

                            <i class="bi bi-search"></i>

                        </button>

                    </div>







                    <button class="btn btn-warning position-relative ms-3" data-bs-toggle="modal"
                        data-bs-target="#cartModal" onclick="showCart()">

                        <i class="bi bi-cart-fill"></i>
                        Cart

                        <span id="cart-count"
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                            0
                        </span>

                    </button>

                </div>

            </div>

        </nav>

    </header>



    <main class="container py-5">

        <h2 class="text-center fw-bold mb-4">
            Our Products
        </h2>



        <div class="row" id="product-list">

        </div>



        <div class="row mt-4" id="cart-items" style="display:none;">

        </div>



        <div id="checkout-section" class="mt-4">

        </div>

        <div class="modal fade" id="cartModal" tabindex="-1">

            <div class="modal-dialog modal-xl">

                <div class="modal-content">

                    <div class="modal-header">

                        <h5 class="modal-title">
                            Shopping Cart
                        </h5>

                        <button type="button" class="btn-close" data-bs-dismiss="modal">
                        </button>

                    </div>

                    <div class="modal-body">

                        <table class="table table-bordered table-hover text-center align-middle">

                            <thead class="table-dark">


                                <tr>
                                    <th>No.</th>
                                    <th>Image</th>
                                    <th>Product</th>
                                    <th>Qty</th>
                                    <th>Total</th>
                                    <th>Action</th>
                                </tr>

                            </thead>

                            <tbody id="cart-body">


                            </tbody>

                        </table>

                    </div>

                    <div class="modal-footer justify-content-between">

                        <h4 class="mb-0">
                            Total :
                            <span id="grand-total">₹0</span>
                        </h4>

                        <div>

                            <button class="btn btn-secondary" data-bs-dismiss="modal">
                                Close
                            </button>

                            <button class="btn btn-success" onclick="checkout()">
                                Checkout
                            </button>
                        </div>

                    </div>



                </div>

            </div>

        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
    <script src="./script.js"></script>
</body>

</html>
